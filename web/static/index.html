<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TenderCopilot - 招标助手</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.3/dist/cdn.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --bg-page: #f0f2f5;
      --bg-card: #fff;
      --primary: #1a5f7a;
      --primary-hover: #155269;
      --primary-light: #e8f4f8;
      --border: #e1e5e9;
      --text: #1f2937;
      --text-muted: #6b7280;
      --success: #059669;
      --success-bg: #d1fae5;
      --warning: #d97706;
      --warning-bg: #fef3c7;
      --danger: #dc2626;
      --danger-bg: #fee2e2;
      --radius: 10px;
      --radius-sm: 6px;
      --shadow: 0 1px 3px rgba(0,0,0,.06);
      --shadow-md: 0 4px 12px rgba(0,0,0,.08);
    }
    * { box-sizing: border-box; }
    body {
      font-family: 'Noto Sans SC', system-ui, sans-serif;
      margin: 0;
      padding: 0;
      background: var(--bg-page);
      color: var(--text);
      line-height: 1.5;
      min-height: 100vh;
    }
    .app-wrap {
      max-width: 920px;
      margin: 0 auto;
      padding: 1.5rem;
    }
    .header {
      background: var(--bg-card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 0.75rem 1.25rem;
      margin-bottom: 1.5rem;
    }
    .logo {
      font-weight: 700;
      font-size: 1.125rem;
      color: var(--primary);
      margin-bottom: 0.75rem;
    }
    nav {
      display: flex;
      gap: 0.25rem;
    }
    nav a {
      padding: 0.5rem 1rem;
      border-radius: var(--radius-sm);
      color: var(--text-muted);
      text-decoration: none;
      font-weight: 500;
      transition: background .15s, color .15s;
    }
    nav a:hover { color: var(--primary); background: var(--primary-light); }
    nav a.active { color: var(--primary); background: var(--primary-light); }
    .panel { display: none; }
    .panel.active { display: block; animation: fadeIn .2s ease; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .card {
      background: var(--bg-card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 1.25rem;
      margin-bottom: 1rem;
    }
    .card h2 {
      margin: 0 0 1rem 0;
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--text);
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.5rem 1rem;
      border-radius: var(--radius-sm);
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: background .15s, opacity .15s;
      font-family: inherit;
    }
    .btn.primary { background: var(--primary); color: #fff; }
    .btn.primary:hover:not(:disabled) { background: var(--primary-hover); }
    .btn.primary:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn.secondary { background: var(--bg-page); color: var(--text); border: 1px solid var(--border); }
    .btn.secondary:hover { background: var(--border); }
    .btn.danger { background: var(--danger); color: #fff; }
    .btn.danger:hover { background: #b91c1c; }
    .btn-sm { padding: 0.35rem 0.65rem; font-size: 0.8125rem; }
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 0.75rem 1rem; border-bottom: 1px solid var(--border); }
    th { font-weight: 600; color: var(--text-muted); font-size: 0.8125rem; text-transform: none; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #fafafa; }
    .report-list { list-style: none; padding: 0; margin: 0; }
    .report-list li { margin: 0; }
    .report-list a {
      display: block;
      padding: 0.75rem 1rem;
      color: var(--primary);
      text-decoration: none;
      border-radius: var(--radius-sm);
      transition: background .15s;
    }
    .report-list a:hover { background: var(--primary-light); }
    .report-list li + li a { border-top: 1px solid var(--border); }
    .report-content {
      background: var(--bg-card);
      padding: 1.5rem;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow-x: auto;
      line-height: 1.6;
    }
    .report-content h1 { font-size: 1.5rem; margin-top: 0; margin-bottom: 0.75rem; }
    .report-content h2 { font-size: 1.25rem; margin-top: 1.25rem; margin-bottom: 0.5rem; }
    .report-content h3 { font-size: 1.1rem; margin-top: 1rem; margin-bottom: 0.4rem; }
    .report-content p { margin: 0.5rem 0; }
    .report-content ul, .report-content ol { margin: 0.5rem 0; padding-left: 1.5rem; }
    .status {
      padding: 0.6rem 1rem;
      border-radius: var(--radius-sm);
      font-size: 0.875rem;
      font-weight: 500;
    }
    .status.running { background: var(--warning-bg); color: var(--warning); }
    .status.success { background: var(--success-bg); color: var(--success); }
    .status.failed { background: var(--danger-bg); color: var(--danger); }
    .status.idle { background: #f3f4f6; color: var(--text-muted); }
    label {
      display: block;
      margin-top: 0.75rem;
      margin-bottom: 0.25rem;
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--text);
    }
    label:first-of-type { margin-top: 0; }
    input, textarea, select {
      width: 100%;
      max-width: 420px;
      padding: 0.5rem 0.75rem;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 0.875rem;
      font-family: inherit;
      transition: border-color .15s, box-shadow .15s;
    }
    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(26, 95, 122, .15);
    }
    textarea { min-height: 80px; resize: vertical; }
    .form-row { margin-bottom: 0.5rem; }
    .checkbox-label { display: flex; align-items: center; gap: 0.5rem; margin-top: 0.5rem; font-weight: 400; cursor: pointer; }
    .checkbox-label input { width: auto; max-width: none; }
    .error { color: var(--danger); font-size: 0.875rem; margin-bottom: 0.5rem; }
    .success-msg { color: var(--success); font-size: 0.875rem; }
    .config-block {
      background: var(--bg-card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 1.25rem;
      margin-bottom: 1.25rem;
    }
    .config-block h3 {
      margin: 0 0 1rem 0;
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }
    .direction-card {
      border: 1px solid var(--border);
      padding: 1rem;
      margin-bottom: 0.75rem;
      border-radius: var(--radius-sm);
      background: #fafbfc;
    }
    .direction-card .head { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 0.75rem; }
    .direction-card .head strong { font-size: 0.9375rem; }
    .direction-card .head .id { color: var(--text-muted); font-size: 0.8125rem; font-weight: 400; }
    .direction-card label { margin-top: 0.5rem; }
    .add-direction { margin-top: 1rem; padding-top: 1rem; border-top: 1px dashed var(--border); }
    .divider { height: 1px; background: var(--border); margin: 1rem 0; }
    .env-hint { font-size: 0.8125rem; color: var(--text-muted); margin-left: 0.5rem; }
    .config-desc { margin: 0 0 1rem 0; font-size: 0.875rem; color: var(--text-muted); }
    .config-provider-group { margin-top: 1rem; padding-top: 1rem; border-top: 1px solid var(--border); }
    .config-hint { margin: 0.75rem 0 0 0; font-size: 0.8125rem; color: var(--text-muted); }
    .config-hint code { background: #f3f4f6; padding: 0.15rem 0.4rem; border-radius: 4px; font-size: 0.8125rem; }
    .config-provider-badge { margin: 0.35rem 0 0 0; font-size: 0.8125rem; color: var(--primary); font-weight: 500; }
    .chart-wrap { background: var(--bg-card); border-radius: var(--radius); box-shadow: var(--shadow); padding: 1rem; margin-top: 1rem; max-width: 560px; height: 220px; }
    .config-subnav {
      display: flex;
      flex-wrap: wrap;
      gap: 0.25rem;
      margin-bottom: 1rem;
      padding: 0.25rem 0;
    }
    .config-subnav a {
      padding: 0.5rem 1rem;
      border-radius: var(--radius-sm);
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.875rem;
      font-weight: 500;
      transition: background .15s, color .15s;
    }
    .config-subnav a:hover { color: var(--primary); background: var(--primary-light); }
    .config-subnav a.active { color: var(--primary); background: var(--primary-light); }
    .config-subpanel { display: none; }
    .config-subpanel.active { display: block; animation: fadeIn .2s ease; }
  </style>
</head>
<body>
  <div x-data="app()" x-init="init()" class="app-wrap">
    <header class="header">
      <div class="logo">TenderCopilot · 招标助手</div>
      <nav>
        <a href="#" @click.prevent="tab='reports'" :class="{ active: tab==='reports' }">报告</a>
        <a href="#" @click.prevent="tab='run'" :class="{ active: tab==='run' }">立即运行</a>
        <a href="#" @click.prevent="tab='config'" :class="{ active: tab==='config' }">配置</a>
        <a href="#" @click.prevent="tab='history'" :class="{ active: tab==='history' }">历史</a>
      </nav>
    </header>

    <div id="reports" class="panel" :class="{ active: tab==='reports' }">
      <div class="card">
        <template x-if="reportDetail">
          <div>
            <button class="btn secondary" @click="reportDetail=null">← 返回列表</button>
            <div class="report-content" style="margin-top:1rem;" x-html="reportDetailHtml"></div>
          </div>
        </template>
        <template x-if="!reportDetail">
          <div>
            <h2>日报列表</h2>
            <ul class="report-list">
              <template x-for="r in reports" :key="r.id">
                <li><a href="#" @click.prevent="openReport(r.id)" x-text="r.created || r.filename"></a></li>
              </template>
            </ul>
          </div>
        </template>
      </div>
    </div>

    <div id="run" class="panel" :class="{ active: tab==='run' }">
      <div class="card">
        <h2>手动运行</h2>
        <p><button class="btn primary" @click="triggerRun()" :disabled="runStatus.status==='running'">立即运行一次</button></p>
        <div class="status" :class="runStatus.status" x-text="runStatus.message || runStatus.status"></div>
        <p style="margin-top:0.75rem; color: var(--text-muted); font-size:0.875rem;" x-show="runStatus.last_run_time">上次运行：<span x-text="runStatus.last_run_time"></span></p>
      </div>
    </div>

    <div id="config" class="panel" :class="{ active: tab==='config' }">
      <div class="card">
        <h2>配置</h2>
        <p class="error" x-show="configError && configError !== '已保存'" x-text="configError"></p>
        <p class="success-msg" x-show="configError === '已保存'" x-text="configError"></p>
        <template x-if="config.settings">
          <div class="config-subnav">
            <a href="#" @click.prevent="configSubTab='directions'" :class="{ active: configSubTab==='directions' }">业务方向</a>
            <a href="#" @click.prevent="configSubTab='notice'" :class="{ active: configSubTab==='notice' }">公告类型</a>
            <a href="#" @click.prevent="configSubTab='ai'" :class="{ active: configSubTab==='ai' }">AI 模型</a>
            <a href="#" @click.prevent="configSubTab='notify'" :class="{ active: configSubTab==='notify' }">通知</a>
            <a href="#" @click.prevent="configSubTab='schedule'" :class="{ active: configSubTab==='schedule' }">定时与爬虫</a>
          </div>
        </template>
      </div>
      <template x-if="config.settings">
        <form @submit.prevent="saveConfig()">
          <div class="config-subpanel" :class="{ active: configSubTab==='directions' }">
            <section class="config-block">
              <h3>关键词与业务方向</h3>
              <template x-for="(dir, key) in config.business_directions" :key="key">
                <div class="direction-card">
                  <div class="head">
                    <span><strong x-text="dir.name || key"></strong><span class="id" x-text="' (ID: ' + key + ')'"></span></span>
                    <button type="button" class="btn danger btn-sm" @click="removeDirection(key)">删除</button>
                  </div>
                  <div class="form-row">
                    <label>包含关键词（逗号分隔）</label>
                    <input type="text" x-model="dir.keywords_include_str" placeholder="文化, 氛围, 墙" />
                  </div>
                  <div class="form-row">
                    <label>排除关键词（逗号分隔）</label>
                    <input type="text" x-model="dir.keywords_exclude_str" placeholder="可选" />
                  </div>
                  <label class="checkbox-label"><input type="checkbox" x-model="dir.location_required" /> 地域限制</label>
                </div>
              </template>
              <div class="add-direction">
                <label>新增业务方向 ID（英文键名）</label>
                <input type="text" x-model="newDirectionId" placeholder="如 my_business" />
                <label>名称</label>
                <input type="text" x-model="newDirectionName" placeholder="如 某类项目" />
                <button type="button" class="btn primary" @click="addDirection()">新增方向</button>
              </div>
            </section>
          </div>

          <div class="config-subpanel" :class="{ active: configSubTab==='notice' }">
            <section class="config-block">
              <h3>公告类型</h3>
              <label>保留类型（include）</label>
              <input type="text" x-model="noticeTypesIncludeStr" placeholder="招标公告, 采购公告, 询价公告（逗号分隔，可自定义）" />
              <label>排除类型（exclude）</label>
              <input type="text" x-model="noticeTypesExcludeStr" placeholder="废标公告, 流标公告, 中标公告（逗号分隔）" />
              <label class="checkbox-label"><input type="checkbox" x-model="config.settings.announcement_filter.notice_types.include_correction" /> 包含更正公告</label>
            </section>
          </div>

          <div class="config-subpanel" :class="{ active: configSubTab==='ai' }">
            <section class="config-block">
              <h3>AI 模型</h3>
              <p class="config-desc">使用任意 OpenAI 兼容接口（智谱、OpenAI、Gemini、DeepSeek 等），填写接口地址后会自动识别供应商。</p>
              <label>是否使用 AI</label>
              <select x-model="config.settings.analyzer.provider">
                <option value="custom_openai">自定义 OpenAI 兼容接口</option>
                <option value="none">不使用 AI</option>
              </select>

              <template x-if="config.settings.analyzer.provider === 'custom_openai'">
                <div class="config-provider-group">
                  <label>接口地址（Base URL）</label>
                  <input type="text" x-model="config.settings.analyzer.custom_base_url" placeholder="https://open.bigmodel.cn/api/paas/v4 或 https://api.openai.com/v1" />
                  <p class="config-provider-badge" x-show="config.settings.analyzer.custom_base_url && detectedProviderName(config.settings.analyzer.custom_base_url)" x-text="'已识别：' + detectedProviderName(config.settings.analyzer.custom_base_url)"></p>
                  <label>模型名</label>
                  <input type="text" x-model="config.settings.analyzer.custom_model" placeholder="如 glm-4-flash、gpt-4o-mini" />
                  <label>API Key（留空不修改，保存后写入 .env）</label>
                  <div>
                    <input type="password" x-model="envInputs.CUSTOM_OPENAI_API_KEY" placeholder="已配置则显示为 ***" />
                    <span class="env-hint" x-show="config.env_configured && config.env_configured.CUSTOM_OPENAI_API_KEY">已配置</span>
                  </div>
                </div>
              </template>

              <template x-if="config.settings.analyzer.provider === 'none'">
                <p class="config-hint">当前不使用 AI，将仅通过规则提取信息。</p>
              </template>
            </section>
          </div>

          <div class="config-subpanel" :class="{ active: configSubTab==='notify' }">
            <section class="config-block">
              <h3>企业微信 / 邮箱</h3>
              <label class="checkbox-label"><input type="checkbox" x-model="config.notifications.wechat_work.enabled" /> 启用企业微信</label>
              <label>Webhook URL（留空不修改）</label>
              <div>
                <input type="password" x-model="envInputs.WECHAT_WORK_WEBHOOK" placeholder="已配置则显示为 ***" />
                <span class="env-hint" x-show="config.env_configured && config.env_configured.WECHAT_WORK_WEBHOOK">已配置</span>
              </div>
              <div class="divider"></div>
              <label class="checkbox-label"><input type="checkbox" x-model="config.notifications.email.enabled" /> 启用邮件</label>
              <label>SMTP 服务器</label>
              <input type="text" x-model="config.notifications.email.smtp_server" />
              <label>发件人</label>
              <input type="text" x-model="config.notifications.email.sender" />
              <label>邮箱密码（留空不修改，写入 .env）</label>
              <div>
                <input type="password" x-model="envInputs.EMAIL_PASSWORD" placeholder="已配置则显示为 ***" />
                <span class="env-hint" x-show="config.env_configured && config.env_configured.EMAIL_PASSWORD">已配置</span>
              </div>
              <label>收件人（每行一个）</label>
              <textarea x-model="emailRecipientsStr" rows="2" placeholder="user@example.com"></textarea>
            </section>
          </div>

          <div class="config-subpanel" :class="{ active: configSubTab==='schedule' }">
            <section class="config-block">
              <h3>定时运行</h3>
              <label class="checkbox-label"><input type="checkbox" x-model="config.settings.scheduler.enabled" /> 启用定时任务</label>
              <label>执行时间（每行一个 HH:mm）</label>
              <textarea x-model="schedulerTimesStr" rows="4" placeholder="09:00&#10;11:55&#10;13:00&#10;17:55"></textarea>
              <label>时区</label>
              <input type="text" x-model="config.settings.scheduler.timezone" placeholder="Asia/Shanghai" />
            </section>
            <section class="config-block">
              <h3>爬虫与评分</h3>
              <label>min_total_score（推荐阈值）</label>
              <input type="number" x-model.number="config.settings.scoring.min_total_score" />
              <label>max_fetch_details</label>
              <input type="number" x-model.number="config.settings.spider.max_fetch_details" />
            </section>
          </div>

          <div class="card">
            <button type="submit" class="btn primary">保存配置</button>
          </div>
        </form>
      </template>
    </div>

    <div id="history" class="panel" :class="{ active: tab==='history' }">
      <div class="card">
        <h2>爬取历史</h2>
        <table>
          <thead><tr><th>时间</th><th>数量</th><th>状态</th></tr></thead>
          <tbody>
            <template x-for="c in historyCrawls" :key="c.id">
              <tr>
                <td x-text="c.crawl_time"></td>
                <td x-text="c.announcement_count"></td>
                <td x-text="c.success ? '成功' : '失败'"></td>
              </tr>
            </template>
          </tbody>
        </table>
        <div class="chart-wrap"><canvas id="chartCanvas"></canvas></div>
      </div>
    </div>
  </div>

  <script>
    function app() {
      return {
        tab: 'reports',
        reports: [],
        reportDetail: null,
        reportDetailHtml: '',
        runStatus: { status: 'idle', message: null, last_run_time: null },
        config: {},
        configSubTab: 'directions',
        configError: '',
        envInputs: { CUSTOM_OPENAI_API_KEY: '', WECHAT_WORK_WEBHOOK: '', EMAIL_PASSWORD: '' },
        newDirectionId: '',
        newDirectionName: '',
        noticeTypesIncludeStr: '',
        noticeTypesExcludeStr: '',
        emailRecipientsStr: '',
        schedulerTimesStr: '',
        historyCrawls: [],
        historyStats: [],
        chart: null,

        async init() {
          this.loadReports();
          this.loadRunStatus();
          this.loadConfig();
          this.loadHistory();
        },

        async loadReports() {
          try {
            const r = await fetch('/api/reports');
            const d = await r.json();
            this.reports = d.reports || [];
          } catch (e) { this.reports = []; }
        },

        async openReport(id) {
          try {
            const r = await fetch('/api/reports/' + encodeURIComponent(id));
            const d = await r.json();
            this.reportDetail = d.markdown;
            this.reportDetailHtml = typeof marked !== 'undefined' ? marked.parse(d.markdown || '') : d.markdown;
          } catch (e) { this.reportDetailHtml = '加载失败'; }
        },

        async triggerRun() {
          try {
            await fetch('/api/run', { method: 'POST' });
            this.runStatus = { status: 'running', message: '已启动' };
            const t = setInterval(async () => {
              await this.loadRunStatus();
              if (this.runStatus.status !== 'running') {
                clearInterval(t);
                this.loadReports();
              }
            }, 2000);
          } catch (e) { this.runStatus = { status: 'failed', message: e.message }; }
        },

        async loadRunStatus() {
          try {
            const r = await fetch('/api/run/status');
            this.runStatus = await r.json();
          } catch (e) {}
        },

        async loadConfig() {
          try {
            const r = await fetch('/api/config');
            this.config = await r.json();
            const s = this.config.settings || {};
            if (!s.scoring) s.scoring = {};
            if (!s.spider) s.spider = {};
            if (!s.analyzer) s.analyzer = {};
            if (s.analyzer.provider === 'openai' || s.analyzer.provider === 'gemini') s.analyzer.provider = 'custom_openai';
            if (!s.scheduler) s.scheduler = { enabled: true, times: [], timezone: 'Asia/Shanghai' };
            if (s.scheduler.enabled === undefined) s.scheduler.enabled = true;
            if (!Array.isArray(s.scheduler.times)) s.scheduler.times = [];
            if (!s.announcement_filter) s.announcement_filter = {};
            if (!s.announcement_filter.notice_types) s.announcement_filter.notice_types = { enabled: true, include: [], exclude: [], include_correction: true };
            this.config.settings = s;
            const n = this.config.notifications || {};
            if (!n.wechat_work) n.wechat_work = {};
            if (!n.email) n.email = {};
            n.email.recipients = n.email.recipients || [];
            this.config.notifications = n;
            this.config.business_directions = this.config.business_directions || {};
            Object.keys(this.config.business_directions).forEach(k => {
              const d = this.config.business_directions[k];
              d.keywords_include_str = (d.keywords_include || []).join(', ');
              d.keywords_exclude_str = (d.keywords_exclude || []).join(', ');
            });
            this.noticeTypesIncludeStr = (s.announcement_filter.notice_types.include || []).join(', ');
            this.noticeTypesExcludeStr = (s.announcement_filter.notice_types.exclude || []).join(', ');
            this.emailRecipientsStr = (n.email.recipients || []).join('\n');
            this.schedulerTimesStr = (s.scheduler.times || []).join('\n');
            this.config.env_configured = this.config.env_configured || {};
          } catch (e) { this.config = {}; }
        },

        addDirection() {
          const id = (this.newDirectionId || '').trim().replace(/\s+/g, '_');
          if (!id) return;
          if (this.config.business_directions[id]) { this.configError = '该 ID 已存在'; return; }
          this.config.business_directions[id] = {
            name: this.newDirectionName || id,
            keywords_include: [],
            keywords_exclude: [],
            keywords_include_str: '',
            keywords_exclude_str: '',
            location_required: false,
            weight: 1.0,
            description: ''
          };
          this.newDirectionId = ''; this.newDirectionName = '';
        },

        removeDirection(key) {
          if (confirm('确定删除该业务方向？')) delete this.config.business_directions[key];
        },

        detectedProviderName(url) {
          if (!url || typeof url !== 'string') return '';
          const u = url.toLowerCase();
          if (u.includes('bigmodel.cn')) return '智谱';
          if (u.includes('openai.com')) return 'OpenAI';
          if (u.includes('anthropic.com') || u.includes('claude')) return 'Claude (Anthropic)';
          if (u.includes('gemini') || u.includes('generativelanguage')) return 'Google Gemini';
          if (u.includes('deepseek')) return 'DeepSeek';
          if (u.includes('moonshot') || u.includes('api.moonshot')) return '月之暗面 Moonshot';
          if (u.includes('volcengine') || u.includes('byteplus')) return '火山引擎';
          return '';
        },

        async saveConfig() {
          this.configError = '';
          const payload = { settings: {}, business_directions: {}, notifications: {} };
          const s = this.config.settings;
          payload.settings = JSON.parse(JSON.stringify(s));
          payload.settings.announcement_filter.notice_types.include = this.noticeTypesIncludeStr.split(',').map(x => x.trim()).filter(Boolean);
          payload.settings.announcement_filter.notice_types.exclude = this.noticeTypesExcludeStr.split(',').map(x => x.trim()).filter(Boolean);
          payload.settings.scheduler.times = this.schedulerTimesStr.split(/\r?\n/).map(x => x.trim()).filter(Boolean);
          payload.notifications = JSON.parse(JSON.stringify(this.config.notifications));
          payload.notifications.email.recipients = this.emailRecipientsStr.split(/\r?\n/).map(x => x.trim()).filter(Boolean);
          const dirs = {};
          Object.keys(this.config.business_directions).forEach(k => {
            const d = this.config.business_directions[k];
            dirs[k] = {
              name: d.name,
              keywords_include: (d.keywords_include_str || '').split(',').map(x => x.trim()).filter(Boolean),
              keywords_exclude: (d.keywords_exclude_str || '').split(',').map(x => x.trim()).filter(Boolean),
              location_required: !!d.location_required,
              weight: d.weight != null ? d.weight : 1.0,
              description: d.description || ''
            };
            if (d.location_priority) dirs[k].location_priority = d.location_priority;
            if (d.location_bonus !== undefined) dirs[k].location_bonus = d.location_bonus;
          });
          payload.business_directions = dirs;
          const env = {};
          if ((this.envInputs.CUSTOM_OPENAI_API_KEY || '').trim()) env.CUSTOM_OPENAI_API_KEY = this.envInputs.CUSTOM_OPENAI_API_KEY.trim();
          if ((this.envInputs.WECHAT_WORK_WEBHOOK || '').trim()) env.WECHAT_WORK_WEBHOOK = this.envInputs.WECHAT_WORK_WEBHOOK.trim();
          if ((this.envInputs.EMAIL_PASSWORD || '').trim()) env.EMAIL_PASSWORD = this.envInputs.EMAIL_PASSWORD.trim();
          if (Object.keys(env).length) payload.env = env;
          try {
            await fetch('/api/config', {
              method: 'PUT',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(payload)
            });
            this.configError = '已保存';
            setTimeout(() => { this.configError = ''; this.loadConfig(); }, 1500);
          } catch (e) { this.configError = e.message; }
        },

        async loadHistory() {
          try {
            const [cr, st] = await Promise.all([
              fetch('/api/history/crawls').then(r => r.json()),
              fetch('/api/history/stats?days=30').then(r => r.json())
            ]);
            this.historyCrawls = cr.crawls || [];
            this.historyStats = st.by_day || [];
            this.$nextTick(() => this.drawChart());
          } catch (e) { this.historyCrawls = []; this.historyStats = []; }
        },

        drawChart() {
          const canvas = document.getElementById('chartCanvas');
          if (!canvas || !this.historyStats.length) return;
          if (this.chart) this.chart.destroy();
          this.chart = new Chart(canvas, {
            type: 'line',
            data: {
              labels: this.historyStats.map(x => x.date),
              datasets: [
                { label: '爬取量', data: this.historyStats.map(x => x.announcement_count), borderColor: '#1a5f7a', backgroundColor: 'rgba(26,95,122,0.08)', fill: true, tension: 0.2 }
              ]
            },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true } } }
          });
        }
      };
    }
  </script>
</body>
</html>
