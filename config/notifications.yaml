wechat_work:
  enabled: true
  webhook_url: ${WECHAT_WORK_WEBHOOK}
  mention_users: []
  retry_times: 3
  timeout: 10
email:
  enabled: false
  smtp_server: smtp.example.com
  smtp_port: 465
  use_ssl: true
  sender: tender@company.com
  sender_password: ${EMAIL_PASSWORD}
  recipients:
  - user1@company.com
  - user2@company.com
  cc: []
  subject_prefix: '[招标助手]'
wechat:
  enabled: false
  service: serverchan
  token: ${WECHAT_PERSONAL_TOKEN}
dingtalk:
  enabled: false
  webhook_url: ${DINGTALK_WEBHOOK}
  secret: ${DINGTALK_SECRET}
notification_rules:
  high_priority_instant: true
  medium_priority_daily: true
  low_priority_skip: true
  daily_report_time: '18:00'
  send_empty_report: false
admin_alerts:
  enabled: true
  channels:
  - wechat_work
  alert_on:
  - crawler_failure
  - high_error_rate
  - no_matches_48h
