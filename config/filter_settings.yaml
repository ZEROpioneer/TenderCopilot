# 公告类型编码映射
# ============================================
# 注意：这些代码是推测的，可能不准确
# 需要通过实际 API 请求验证
# 
# 验证方法：
# 1. 在网站上选择不同的公告类型
# 2. 查看 Network 面板中的请求参数
# 3. 记录实际使用的类型代码
# 4. 更新此映射表
# 
# 常见编码格式：
# - 拼音缩写：zbgg, cggg
# - 数字代码：001, 002
# - 英文代码：notice, announcement
notice_type_codes:
  "招标公告": "zbgg"
  "采购公告": "cggg"
  "中标公告": "zbgg_result"
  "成交公告": "cjgg"
  "竞争性谈判公告": "jzxtp"
  "询价公告": "xjgg"
  "单一来源公告": "dyly"
  "更正公告": "gzgg"
  "废标公告": "fbgg"
  
  # 备用编码（如果上面的不工作，可以尝试这些）
  # "招标公告": "001014"
  # "采购公告": "001001"
  # "中标公告": "001015"

# 数据质量控制
# ============================================
quality_control:
  # 是否验证公告内容完整性
  validate_content: true
  
  # 最小标题长度
  min_title_length: 10
  
  # 是否自动过滤测试/草稿公告
  filter_test_announcements: true
  test_keywords:
    - "测试"
    - "test"
    - "草稿"
    - "删除"
