# ============================================
# 招标公告筛选配置
# ============================================
# 此文件定义爬虫在抓取时的筛选条件，利用网站 API 实现精准爬取

# API 配置
# ============================================
# 注意：当前配置的 API 端点可能已失效 (返回 404)
# 如果 API 失败，系统会自动降级到传统网页爬取模式
# 
# 如何查找正确的 API 端点：
# 1. 运行: python tools/find_api_endpoint.py
# 2. 按照提示手动分析网络请求
# 3. 找到正确的 API 后更新下面的配置
api:
  base_url: "https://www.plap.mil.cn"
  endpoint: "/rest/v1/notice/selectInfoMoreChannel.do"  # ⚠️ 此端点可能已失效
  method: "POST"
  timeout: 30
  
  # 备用端点（如果主端点失效，可以尝试这些）
  # 取消注释并测试以下可能的端点：
  # endpoint: "/freecms/api/notice/list.do"
  # endpoint: "/api/notice/selectList.do"
  # endpoint: "/portal/notice/query.do"
  
# 爬取策略
# ============================================
crawl_strategy:
  # 首次运行抓取天数（建议 3-7 天）
  initial_days: 3
  
  # 增量爬取设置
  incremental:
    enabled: true
    # 增量爬取重叠时间（小时），避免遗漏
    overlap_hours: 1
    # 超过此时间未爬取，执行完整爬取（小时）
    full_crawl_threshold: 24
  
  # 每次最多获取的公告数
  max_results_per_request: 50
  
  # 分页配置
  pagination:
    enabled: true
    page_size: 50
    max_pages: 10  # 最多翻页数，防止无限循环

# 筛选条件
# ============================================
filters:
  # 日期范围（自动计算，基于爬取策略）
  date_range:
    auto: true  # 自动根据上次爬取时间计算
    # 手动指定（当 auto: false 时生效）
    # start_date: "2024-01-01"
    # end_date: "2024-12-31"
  
  # 公告类型
  notice_types:
    enabled: true
    types:
      - "招标公告"
      - "采购公告"
      - "中标公告"
      - "竞争性谈判公告"
      # 可选：
      # - "询价公告"
      # - "单一来源公告"
      # - "更正公告"
  
  # 地域筛选
  regions:
    enabled: true
    # 优先地区（会优先爬取这些地区）
    priority:
      - name: "辽宁省"
        include_cities: true  # 是否包含下属城市
        cities:
          - "大连市"
          - "沈阳市"
      - name: "北京市"
        include_cities: false
    
    # 其他关注地区
    included:
      - "上海市"
      - "广东省"
      - "江苏省"
    
    # 排除地区（如果某些地区项目不感兴趣）
    excluded: []
      # - "西藏自治区"
      # - "新疆维吾尔自治区"
  
  # 金额范围（单位：万元）
  budget_range:
    enabled: false  # 暂时禁用，网站 API 可能不支持
    min: 10
    max: 5000
  
  # 关键词预筛选（在 API 层面筛选，需要网站支持）
  keywords:
    enabled: false  # 网站 API 可能不支持关键词搜索
    # 如果支持，可以配置：
    # terms:
    #   - "文化"
    #   - "数字史馆"
    #   - "仿真"

