target_sites:
  plap:
    name: 军队采购网
    base_url: https://www.plap.mil.cn
    announcement_list_url: https://www.plap.mil.cn/freecms-glht/site/juncai/cggg/index.html
    enabled: true
spider:
  headless: true
  timeout: 30
  retry_times: 3
  retry_delay: 5
  max_fetch_details: 50
  download_attachments: true
  attachment_types:
  - .pdf
  - .docx
  - .doc
  max_attachment_size: 20
  user_agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36
  request_delay_range:
  - 1
  - 2
  wait_ajax_load: 0.5
  wait_page_refresh: 1
  wait_between_pages: 2
  max_concurrent_details: 3
crawl_strategy:
  use_incremental: true
  enable_db_dedup: true
  enable_time_filter: false
  initial_hours: 168
  max_pages: null
  max_consecutive_exists: 15
  max_total_items: 1000
  warn_threshold: 200
scheduler:
  enabled: false
  times:
  - 09:00
  - '11:55'
  - '13:00'
  - '17:55'
  - '11:13'
  timezone: Asia/Shanghai
  max_runtime_minutes: 30
database:
  type: sqlite
  path: data/history.db
  retention_days: 365
  backup_enabled: true
  backup_dir: data/backups
  auto_vacuum: true
analyzer:
  provider: custom_openai
  api_key: ${GEMINI_API_KEY}
  model: gemini-1.5-pro
  max_tokens: 2000
  temperature: 0.3
  timeout: 30
  retry_times: 3
  fallback_to_rules: true
  custom_base_url: https://open.bigmodel.cn/api/paas/v4
  custom_api_key: ${CUSTOM_OPENAI_API_KEY}
  custom_model: glm-4-air
deep_analysis:
  enabled: true
  analyze_content: true
  analyze_attachments: true
  extract_ai: true
  download_attachments_for_analysis: true
  analyze_pdf: true
  analyze_docx: true
scoring:
  min_total_score: 30
  push_threshold: 30
  min_relevance_score: 40
  min_deadline_days: 3
  weights:
    keyword_match: 60
    content_relevance: 20
    time: 20
    location_bonus: 5
announcement_filter:
  notice_types:
    enabled: true
    include:
    - 招标公告
    - 采购公告
    - 竞争性谈判公告
    - 询价公告
    - 公告
    include_correction: true
    exclude:
    - 中标公告
    - 成交公告
    - 结果公示
  smart_track:
    enabled: true
    score_threshold: 60
    smart_track_types:
    - 更正公告
    - 流标公告
    - 废标公告
    - 变更公告
reporter:
  output_format: markdown
  save_to_file: true
  output_dir: data/reports/
  include_attachments_link: true
  max_projects_per_report: 50
  compress_old_reports: true
logging:
  level: INFO
  console_level: INFO
  file_level: DEBUG
  format: '<green>{time:YYYY-MM-DD HH:mm:ss}</green> | <level>{level: <8}</level>
    | <cyan>{name}</cyan>:<cyan>{function}</cyan>:<cyan>{line}</cyan> - <level>{message}</level>'
  rotation: 10 MB
  retention: 30 days
  compression: zip
  log_file: logs/tendercopilot.log
  detail_dir: logs/detail
monitoring:
  enabled: true
  metrics_collection_interval: 3600
  alert_thresholds:
    crawler_failure_rate: 0.5
    no_matches_hours: 48
    notification_failures: 5
proxy:
  enabled: false
  http: ''
  https: ''
development:
  debug: false
  mock_spider: false
  skip_notifications: false
  dry_run: false
