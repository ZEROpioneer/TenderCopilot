# TenderCopilot 主配置文件

# 目标网站配置
target_sites:
  plap:
    name: "军队采购网"
    base_url: "https://www.plap.mil.cn"
    announcement_list_url: "https://www.plap.mil.cn/freecms-glht/site/juncai/cggg/index.html"
    enabled: true

# 爬虫配置
spider:
  headless: true  # 无头模式
  timeout: 30  # 页面加载超时（秒）
  retry_times: 3  # 失败重试次数
  retry_delay: 5  # 重试延迟（秒）
  max_fetch_details: 50  # 最多获取多少个公告的详情（避免爬取太慢）
  download_attachments: true  # 是否下载附件
  attachment_types:  # 允许下载的附件类型
    - ".pdf"
    - ".docx"
    - ".doc"
  max_attachment_size: 20  # 最大附件大小（MB）- 统一配置
  user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"
  request_delay_range:  # 请求间隔随机范围（秒）
    - 1
    - 2
  # 等待时间配置（优化性能）
  wait_ajax_load: 0.5           # AJAX加载等待（秒）
  wait_page_refresh: 1          # 页面刷新等待（秒）
  wait_between_pages: 2         # 翻页间隔（秒）
  max_concurrent_details: 3     # 并发爬取详情页数量

# 爬取策略配置（统一配置）
crawl_strategy:
  # 增量爬取配置
  use_incremental: true           # 使用增量模式（从上次爬取时间开始）
  enable_db_dedup: true           # 启用数据库去重
  enable_time_filter: false       # 启用时间过滤（默认关闭，依赖数据库ID去重）
  initial_hours: 168              # 首次运行时爬取最近N小时（7天）
  
  # 多页爬取配置
  max_pages: null                 # 不限制页数（null=无限制，直到连续重复停止）
  max_consecutive_exists: 5       # 连续重复停止阈值（主要停止机制）
  
  # 保护性上限（防止异常情况无限爬取）
  max_total_items: 300            # 单次爬取最多条数（达到后警告并停止）
  warn_threshold: 200             # 警告阈值（爬取超过此数量时发出提醒）

# 定时调度配置
scheduler:
  enabled: true   # 是否启用定时任务（false 时时间配置保留但不执行）
  times:
    - "09:00"
    - "11:55"
    - "13:00"
    - "17:55"
  timezone: "Asia/Shanghai"
  max_runtime_minutes: 30  # 单次任务最大运行时间

# 数据库配置
database:
  type: "sqlite"
  path: "data/history.db"
  retention_days: 365  # 数据保留天数
  backup_enabled: true
  backup_dir: "data/backups"
  auto_vacuum: true

# AI 分析配置（默认对接智谱 GLM 的 OpenAI 兼容接口）
analyzer:
  # AI 提供商选择: 'openai' / 'gemini' / 'custom_openai' / 'none'
  # - 推荐：使用智谱 GLM 的 OpenAI 兼容接口 => 'custom_openai'
  # - 如果暂时不用模型，可以设为 'none'
  provider: "custom_openai"
  
  # 通用 API Key（仅在 provider=openai 或 gemini 时使用）
  api_key: "${GEMINI_API_KEY}"
  
  # 模型选择（仅在 provider=openai 或 gemini 时使用）
  # Gemini 可选: gemini-pro, gemini-1.5-pro
  # OpenAI 可选: gpt-4o-mini, gpt-4o, gpt-4-turbo
  model: "gemini-1.5-pro"
  
  max_tokens: 2000
  temperature: 0.3  # 降低随机性
  timeout: 30
  retry_times: 3
  fallback_to_rules: true  # API失败时降级到规则提取

  # 自定义 OpenAI 兼容接口（推荐：智谱 GLM OpenAI 兼容接口）
  # 文档：https://docs.bigmodel.cn/cn/guide/develop/openai/introduction
  # 官方示例：
  #   client = OpenAI(
  #       api_key="your-zhipuai-api-key",
  #       base_url="https://open.bigmodel.cn/api/paas/v4/"
  #   )
  #
  # 在本项目中只需要配置：
  #   - custom_base_url  为上面的 base_url
  #   - custom_api_key   为你的智谱 API Key（通过环境变量传入）
  #   - custom_model     为你选用的 GLM 模型名（如 glm-4-flash）
  custom_base_url: "https://open.bigmodel.cn/api/paas/v4"   # 智谱 OpenAI 兼容 base_url（末尾不必加 / ）
  custom_api_key: "${CUSTOM_OPENAI_API_KEY}"                # 智谱 API Key（在 .env 中配置）
  custom_model: "glm-4-flash"                                   # 智谱模型名称（可按实际修改）

# 深度分析配置
deep_analysis:
  enabled: true
  analyze_content: true      # 内容相关度分析
  analyze_attachments: true  # 附件分析
  extract_ai: true           # AI信息提取
  
  # 附件处理（统一使用 spider.max_attachment_size）
  download_attachments_for_analysis: true  # 只下载需要分析的附件
  analyze_pdf: true
  analyze_docx: true

# 评分配置（新增）
scoring:
  min_total_score: 65        # 最低推送分数（方向分+基础分达到推荐档）
  min_relevance_score: 40    # 最低相关度
  min_deadline_days: 3       # 最少投标准备天数
  
  # 分数权重（仅供参考，实际权重在 FeasibilityScorer 中实现）
  # 新评分结构：
  # - 方向匹配：0–60分（主导因素）
  # - 基础相关度：0–20分
  # - 时间维度：0–20分（只区分已截止/未截止与大致充足程度）
  # - 地域加分：0–5分（额外加分，用于排序）
  # - AI 完整度 / 附件质量：不直接计入 100 分，只在报告中作为标签展示
  weights:
    keyword_match: 60        # 业务方向匹配（0–60）
    content_relevance: 20    # 基础相关度（0–20）
    time: 20                 # 时间维度（发布新鲜度+截止充足度，0–20）
    location_bonus: 5        # 地域加分（额外，0–5）
  
  # 公告类型过滤配置（结合列表页公告类型）
announcement_filter:
  notice_types:
    enabled: true
    # 业务优先关注的公告类型：刚开始、可报名/开标的阶段
    include:
      - "招标公告"
      - "采购公告"
      - "竞争性谈判公告"
      - "询价公告"      # 包含简易询价公告等
    # 是否关注更正公告（更正原招标信息）
    include_correction: true
    # 明确排除的公告类型：结果类/废标类/流标类
    exclude:
      - "废标公告"
      - "流标公告"
      - "中标公告"
      - "成交公告"
  
# 报告生成配置
reporter:
  output_format: "markdown"  # markdown, html, json
  save_to_file: true
  output_dir: "data/reports/"
  include_attachments_link: true
  max_projects_per_report: 50
  compress_old_reports: true  # 压缩旧报告

# 日志配置
logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR
  console_level: "INFO"  # 终端显示级别
  file_level: "DEBUG"    # 详细日志级别
  format: "<green>{time:YYYY-MM-DD HH:mm:ss}</green> | <level>{level: <8}</level> | <cyan>{name}</cyan>:<cyan>{function}</cyan>:<cyan>{line}</cyan> - <level>{message}</level>"
  rotation: "10 MB"  # 日志轮转大小
  retention: "30 days"  # 日志保留时间
  compression: "zip"  # 压缩格式
  log_file: "logs/tendercopilot.log"  # 总体日志（兼容旧配置，detail_dir 优先）
  detail_dir: "logs/detail"          # 详细日志目录（每次运行一个独立文件）

# 性能监控配置
monitoring:
  enabled: true
  metrics_collection_interval: 3600  # 指标收集间隔（秒）
  alert_thresholds:
    crawler_failure_rate: 0.5  # 爬虫失败率阈值
    no_matches_hours: 48  # 无匹配项目告警时间（小时）
    notification_failures: 5  # 通知失败次数阈值

# 代理配置（可选）
proxy:
  enabled: false
  http: ""
  https: ""

# 开发模式配置
development:
  debug: false
  mock_spider: false  # 使用模拟数据测试
  skip_notifications: false  # 跳过通知发送
  dry_run: false  # 干运行模式（不写数据库）
